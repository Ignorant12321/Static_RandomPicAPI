<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Pic API</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23101314'/%3E%3Crect x='2' y='6' width='28' height='20' rx='3' fill='none' stroke='%23b8f3dc' stroke-width='2'/%3E%3Ccircle cx='10' cy='14' r='3' fill='%23b8f3dc'/%3E%3Cpath d='M2 22l8-8 6 6 4-4 10 8' fill='none' stroke='%23b8f3dc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101314;
      --fg: #f4efe7;
      --muted: #b9afa3;
      --line: rgba(244, 239, 231, 0.18);
      --surface: rgba(16, 19, 20, 0.68);
      --accent: #b8f3dc;
      --accent-2: #f4d58d;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(184, 243, 220, 0.16), transparent 32rem),
        linear-gradient(135deg, #101314 0%, #23201b 54%, #111715 100%);
      color: var(--fg);
      font: 16px/1.55 ui-serif, Georgia, "Times New Roman", serif;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1120px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(320px, 1.14fr);
      grid-template-areas:
        "copy preview"
        "controls preview";
      gap: clamp(28px, 5vw, 72px);
      align-items: center;
      align-content: center;
      padding: 56px 0;
    }

    .copy {
      grid-area: copy;
      align-self: end;
    }

    .controls {
      grid-area: controls;
      align-self: start;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font: 0.75rem/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 9ch;
      margin: 0;
      font-size: clamp(3rem, 10vw, 7.4rem);
      line-height: 0.88;
      letter-spacing: 0;
    }

    .intro {
      max-width: 32rem;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
    }

    .actions {
      display: grid;
      gap: 10px;
      max-width: 29rem;
    }

    .action {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .action:first-child {
      border-top: 1px solid var(--line);
    }

    .refresh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
      min-height: 42px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fg);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .refresh span {
      font-size: 1.05rem;
    }

    .refresh code {
      flex: none;
      color: var(--muted);
      font: 0.86rem/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .refresh:hover span,
    .refresh:focus-visible span,
    .external:hover,
    .external:focus-visible {
      color: var(--accent-2);
    }

    .external {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
    }

    .external svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .fine-links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
      color: var(--muted);
      font: 0.9rem/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .fine-links a {
      text-decoration-color: rgba(185, 175, 163, 0.45);
      text-underline-offset: 4px;
    }

    .preview {
      grid-area: preview;
      position: relative;
      min-height: min(72vh, 720px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)),
        #1d211f;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .preview::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 18px);
      transform: translateX(-100%);
      animation: sweep 1.8s ease-in-out infinite;
      z-index: 1;
    }

    .preview.loaded::before,
    .preview.failed::before {
      animation: none;
      opacity: 0;
    }

    .preview img {
      width: 100%;
      height: 100%;
      min-height: min(72vh, 720px);
      display: block;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.015);
      transition: opacity 520ms ease, transform 900ms ease;
    }

    .preview.loaded img {
      opacity: 1;
      transform: scale(1);
    }

    .state {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 26px;
      margin-top: 20px;
      color: var(--muted);
      font: 0.86rem/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(244, 213, 141, 0.12);
    }

    .state.is-loading .dot {
      animation: pulse 1.1s ease-in-out infinite;
    }

    .state.is-ready .dot {
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(184, 243, 220, 0.12);
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); }
      55%, 100% { transform: translateX(100%); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; transform: scale(0.86); }
      50% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 32px, 640px);
        min-height: auto;
        grid-template-columns: 1fr;
        grid-template-areas:
          "copy"
          "preview"
          "controls";
        gap: 22px;
        align-items: start;
        padding: 28px 0 32px;
      }

      h1 {
        max-width: none;
        font-size: clamp(2.6rem, 14vw, 4.8rem);
      }

      .preview,
      .preview img {
        min-height: auto;
        height: clamp(280px, 58vh, 520px);
      }

      .intro {
        margin-top: 18px;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 24px, 640px);
        gap: 18px;
        padding-top: 18px;
        padding-bottom: 24px;
      }

      .eyebrow {
        margin-bottom: 10px;
        font-size: 0.69rem;
      }

      h1 {
        font-size: clamp(2.35rem, 16vw, 3.85rem);
      }

      .intro {
        margin-top: 14px;
        font-size: 0.98rem;
      }

      .actions {
        gap: 8px;
      }

      .refresh {
        min-height: 48px;
      }

      .action {
        grid-template-columns: minmax(0, 1fr) 46px;
        min-height: 64px;
      }

      .external {
        width: 46px;
        height: 46px;
      }

      .preview,
      .preview img {
        height: min(62vh, 430px);
        min-height: 300px;
        border-radius: 8px;
      }

      .state {
        margin-top: 16px;
        font-size: 0.8rem;
      }

      .fine-links {
        margin-top: 18px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="copy" aria-labelledby="title">
      <p class="eyebrow">pic.ssr.ddns-ip.net</p>
      <h1 id="title">Random Pic API</h1>
      <p class="intro">一个静态随机图入口，适合博客封面、背景图和临时占位图。</p>
    </section>

    <div class="preview" id="preview">
      <img
        id="previewImage"
        src="https://pic.ssr.ddns-ip.net/h"
        alt="随机横图预览"
        loading="eager"
        decoding="async"
        fetchpriority="high"
      >
    </div>

    <section class="controls" aria-label="随机图控制">
      <nav class="actions" aria-label="随机图入口">
        <div class="action">
          <button class="refresh" type="button" data-path="/h">
            <span>横图</span>
            <code>/h</code>
          </button>
          <a class="external" href="https://pic.ssr.ddns-ip.net/h" target="_blank" rel="noopener" aria-label="新窗口打开横图 API">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17 17 7"></path><path d="M9 7h8v8"></path></svg>
          </a>
        </div>
        <div class="action">
          <button class="refresh" type="button" data-path="/v">
            <span>竖图</span>
            <code>/v</code>
          </button>
          <a class="external" href="https://pic.ssr.ddns-ip.net/v" target="_blank" rel="noopener" aria-label="新窗口打开竖图 API">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17 17 7"></path><path d="M9 7h8v8"></path></svg>
          </a>
        </div>
        <div class="action">
          <button class="refresh" type="button" data-path="/r">
            <span>随机</span>
            <code>/r</code>
          </button>
          <a class="external" href="https://pic.ssr.ddns-ip.net/r" target="_blank" rel="noopener" aria-label="新窗口打开随机 API">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17 17 7"></path><path d="M9 7h8v8"></path></svg>
          </a>
        </div>
      </nav>

      <p class="state is-loading" id="state" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span id="stateText">正在取一张横图...</span>
      </p>

      <div class="fine-links" aria-label="相关链接">
        <a href="https://pic.ssr.ddns-ip.net/random.js">random.js</a>
        <a href="https://pic.ssr.ddns-ip.net/gallery.html">gallery.html</a>
      </div>
    </section>
  </main>

  <script>
    const baseUrl = 'https://pic.ssr.ddns-ip.net';
    const labels = {
      '/h': '横图',
      '/v': '竖图',
      '/r': '随机图',
    };
    const preview = document.getElementById('preview');
    const image = document.getElementById('previewImage');
    const state = document.getElementById('state');
    const stateText = document.getElementById('stateText');

    function setState(kind, text) {
      state.className = `state is-${kind}`;
      stateText.textContent = text;
    }

    function refreshPreview(path) {
      const label = labels[path] || '图片';
      const nextUrl = `${baseUrl}${path}?t=${Date.now()}`;

      preview.classList.remove('loaded', 'failed');
      setState('loading', `正在取一张${label}...`);
      image.alt = `随机${label}预览`;
      image.src = nextUrl;
    }

    image.addEventListener('load', () => {
      preview.classList.add('loaded');
      setState('ready', '图片已载入，可以继续刷新。');
    });

    image.addEventListener('error', () => {
      preview.classList.add('failed');
      setState('failed', '预览图暂时没有载入，可以稍后再试。');
    });

    document.querySelectorAll('.refresh').forEach((button) => {
      button.addEventListener('click', () => {
        refreshPreview(button.dataset.path);
      });
    });
  </script>
</body>
</html>
